<div class="lrn-qe-edit-form">
    <span data-lrn-qe-label="stimulus"></span>
    <span data-lrn-qe-input="stimulus" class="lrn-qe-ckeditor-lg"></span>

    <span data-lrn-qe-input="multiple_response" class="lrn-qe-inline-block"></span>
    <span data-lrn-qe-label="multiple_response" class="lrn-qe-inline-block lrn-qe-margin-left-xs"></span>

    <span data-lrn-qe-label="options" data-lrn-qe-heading="4" data-lrn-qe-section="options.heading"
          class="lrn-qe-h4 lrn-qe-section-header lrn-qe-text-bold lrn-qe-border-none"></span>
    <div data-lrn-qe-section="options.content">
        <div class="lrn-qe-row-flex lrn-qe-margin-top-md">
            <div data-lrn-qe-loop="options[*]" class="lrn-qe-col-sm-12" data-lrn-qe-layout-wrapper>
                <div class="lrn-qe-row-flex">
                    <div class="lrn-qe-col-sm-12 lrn-qe-col-md-6" data-lrn-qe-layout-wrapper>
                        <span data-lrn-qe-label="options[*].id" class="lrn-qe-margin-top-none"></span>
                        <span data-lrn-qe-input="options[*].id"></span>
                    </div>
                    <div class="lrn-qe-col-sm-12 lrn-qe-col-md-6" data-lrn-qe-layout-wrapper>
                        <span data-lrn-qe-action-remove="options[*]" class="lrn-qe-float-right lrn-qe-padding-top-sm"></span>
                    </div>
                </div>
                <span data-lrn-qe-label="options[*].label"></span>
                <span data-lrn-qe-input="options[*].label"></span>
            </div>
        </div>
        <span data-lrn-qe-action-add="options"></span>
    </div>

    <span data-lrn-qe-label="valid_response" data-lrn-qe-heading="4" data-lrn-qe-section="validation.heading"
          class="lrn-qe-h4 lrn-qe-section-header lrn-qe-text-bold lrn-qe-border-none"></span>
    <div class="lrn-qe-tabs" data-lrn-qe-tabs data-lrn-qe-section="valid_response.content">
        <div class="lrn-qe-tab-item" data-lrn-qe-tab-item>
            <div class="lrn-qe-tab-sub-content">
                <span data-lrn-qe-input="validation.valid_response.score" class="lrn-qe-inline-block lrn-qe-text-left lrn-qe-form-control-xs lrn-qe-margin-left-sm"></span>
                <span data-lrn-qe-label="validation.valid_response.score" class="lrn-qe-inline-block lrn-qe-margin-left-sm"></span>
            </div>
            <div class="lrn-qe-padding-left-sm lrn-qe-padding-right-sm lrn-qe-padding-bottom-xs">
                <span data-lrn-qe-label="validation.valid_response.value"></span>
                <span data-lrn-qe-input="validation.valid_response.value"></span>
            </div>
        </div>
    </div>
</div>
